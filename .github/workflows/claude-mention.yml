name: Claude Mention Handler

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  id-token: write
  contents: read

jobs:
  respond:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Claude responde según etiqueta
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            {% if 'bug' in issue.labels %}
            El usuario reportó un bug. Analiza el código relacionado y sugiere una solución técnica clara. Si puedes, crea una rama con una corrección.
            {% elif 'ayuda' in issue.labels %}
            El usuario necesita ayuda. Ofrece una explicación paso a paso, con ejemplos si es posible. Sé claro y didáctico.
            {% elif 'revisión' in issue.labels %}
            El usuario solicita revisión. Evalúa el código, su estilo y estructura. Sugiere mejoras y buenas prácticas.
            {% else %}
            El usuario mencionó a Claude sin etiquetas específicas. Responde con cortesía y pide más contexto si es necesario.
            {% endif %}
